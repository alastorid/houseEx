name: Update PLVR Open Data

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/update-plvr.yml"
      - "scripts/**"
      - "data/community-overrides.json"
  schedule:
    - cron: "23 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: plvr-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install aria2
        run: brew install aria2
      - run: python3 scripts/fetch-plvr-open-data.py
      - id: commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "fetch: update raw open data"
          file_pattern: "raw/*.zip data/plvr/source-urls.json"

  process:
    needs: fetch
    runs-on: macos-latest
    strategy:
      matrix:
        script:
          - "scripts/build-plvr-web-assets.py"
          - "scripts/build-community-index.py"
          - "scripts/build-sqlite-assets.py --cities all"
    steps:
      - uses: actions/checkout@v4
      - run: python3 ${{ matrix.script }}
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "process: ${{ matrix.script }}"
          file_pattern: "data/plvr/web-index.json data/plvr/web/*.json.gz data/plvr/community-index.json data/plvr/communities/*.json.gz data/db/metadata.json data/db/index.sqlite.gz"

  audit:
    needs: process
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/audit-community-gaps.py
      - run: python3 scripts/smoke-test-sqlite.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "audit: update reports"
          file_pattern: "data/db/qa-report.json data/db/size-report.json data/db/community-gap-report.json"
