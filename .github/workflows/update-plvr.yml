name: Update PLVR Open Data

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/update-plvr.yml"
      - "scripts/**"
      - "data/community-overrides.json"
  schedule:
    - cron: "23 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: plvr-data
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache raw ZIP downloads
        uses: actions/cache@v4
        with:
          path: downloads/plvr
          key: plvr-zips-${{ github.run_id }}
          restore-keys: |
            plvr-zips-

      - name: Fetch raw PLVR data
        run: python3 scripts/fetch-plvr-open-data.py --downloader auto --aria-connections 8 --sleep 0

      - name: Build compressed web shards
        run: python3 scripts/build-plvr-web-assets.py

      - name: Build community index
        run: python3 scripts/build-community-index.py

      - name: Upload prepared PLVR assets
        uses: actions/upload-artifact@v4
        with:
          name: plvr-prepared
          path: |
            data/plvr/source-urls.json
            data/plvr/web-index.json
            data/plvr/web/*.json.gz
            data/plvr/community-index.json
            data/plvr/communities/*.json.gz
          retention-days: 1

  sqlite-city:
    needs: prepare
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        city: [a, b, c, d, e, f, g, h, i, j, k, m, n, o, p, q, t, u, v, w, x, z]
    steps:
      - uses: actions/checkout@v4

      - name: Download prepared PLVR assets
        uses: actions/download-artifact@v4
        with:
          name: plvr-prepared
          path: .

      - name: Build SQLite shards for city
        run: python3 scripts/build-sqlite-assets.py --cities ${{ matrix.city }} --output-dir data/db-part

      - name: Upload SQLite city artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqlite-${{ matrix.city }}
          path: |
            data/db-part/metadata.json
            data/db-part/district/**/*.sqlite.gz
          retention-days: 1

  merge:
    needs: sqlite-city
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download prepared PLVR assets
        uses: actions/download-artifact@v4
        with:
          name: plvr-prepared
          path: .

      - name: Download SQLite city artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sqlite-*
          path: city-parts

      - name: Build SQLite index
        run: python3 scripts/build-sqlite-assets.py

      - name: Merge SQLite city shards
        run: python3 scripts/merge-sqlite-city-parts.py --parts-dir city-parts

      - name: Audit generated data
        run: python3 scripts/audit-community-gaps.py

      - name: Smoke test SQLite assets
        run: python3 scripts/smoke-test-sqlite.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update PLVR generated data"
          file_pattern: "data/plvr/source-urls.json data/plvr/web-index.json data/plvr/web/*.json.gz data/plvr/community-index.json data/plvr/communities/*.json.gz data/db/metadata.json data/db/qa-report.json data/db/size-report.json data/db/community-gap-report.json data/db/index.sqlite.gz data/db/district/**/*.sqlite.gz"
