name: Update PLVR Open Data

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/update-plvr.yml"
      - "scripts/**"
      - "data/community-overrides.json"
  schedule:
    - cron: "23 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: plvr-data
  cancel-in-progress: false

jobs:
  update-plvr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build PLVR region shards
        run: python3 scripts/fetch-plvr-open-data.py

      - name: Build compressed web shards
        run: python3 scripts/build-plvr-web-assets.py

      - name: Build community browser indexes
        run: python3 scripts/build-community-index.py

      - name: Build SQLite query assets
        run: python3 scripts/build-sqlite-assets.py --cities all

      - name: Audit community discovery gaps
        run: python3 scripts/audit-community-gaps.py

      - name: SQLite smoke test
        run: python3 scripts/smoke-test-sqlite.py

      - name: Commit updated PLVR data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update PLVR region shards
          file_pattern: data/community-overrides.json data/plvr/source-urls.json data/plvr/web-index.json data/plvr/web/*.json.gz data/plvr/community-index.json data/plvr/communities/*.json.gz data/db/metadata.json data/db/qa-report.json data/db/size-report.json data/db/community-gap-report.json data/db/index.sqlite.gz data/db/district/**/*.sqlite.gz
