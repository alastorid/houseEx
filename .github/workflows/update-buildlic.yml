name: Update Building License Data

on:
  workflow_dispatch:
  schedule:
    - cron: "41 19 1,11,21 * *"

permissions:
  contents: write
  pages: write

concurrency:
  group: buildlic-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - { part: "00", year_start: 0, year_end: 15 }
          - { part: "01", year_start: 15, year_end: 30 }
          - { part: "02", year_start: 30, year_end: 45 }
          - { part: "03", year_start: 45, year_end: 60 }
          - { part: "04", year_start: 60, year_end: 75 }
          - { part: "05", year_start: 75, year_end: 90 }
          - { part: "06", year_start: 90, year_end: 105 }
          - { part: "07", year_start: 105, year_end: 121 }
    steps:
      - uses: actions/checkout@v4

      - name: Fetch building license range
        run: >-
          python3 scripts/fetch-buildlic-open-data.py
          --year-start ${{ matrix.year_start }}
          --year-end ${{ matrix.year_end }}
          --fetch-only

      - uses: actions/upload-artifact@v4
        with:
          name: buildlic-${{ matrix.part }}
          path: downloads/buildlic/*.json
          retention-days: 1

  build:
    needs: fetch
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: buildlic-*
          path: downloads/buildlic
          merge-multiple: true

      - name: Build district shards
        run: python3 scripts/fetch-buildlic-open-data.py --build-only

      - name: Upload built data
        uses: actions/upload-artifact@v4
        with:
          name: buildlic-site
          path: data/buildlic
          retention-days: 1

  deploy:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: source

      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: publish

      - uses: actions/download-artifact@v4
        with:
          name: buildlic-site
          path: publish/data/buildlic

      - name: Copy frontend
        run: |
          cp source/terminal.html source/terminal.js source/cpamiOpenData.js publish/

      - name: Publish
        working-directory: publish
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add terminal.html terminal.js cpamiOpenData.js data/buildlic
          git commit -m "Update building license data" || exit 0
          git push origin gh-pages
