name: Update Building License Data

on:
  workflow_dispatch:
  schedule:
    - cron: "41 19 1,11,21 * *"
    - cron: "17 */6 * * *"

permissions:
  contents: write
  pages: write

concurrency:
  group: buildlic-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        district:
          - 彰化市
          - 芬園鄉
          - 花壇鄉
          - 秀水鄉
          - 鹿港鎮
          - 福興鄉
          - 線西鄉
          - 和美鎮
          - 伸港鄉
          - 員林市
          - 社頭鄉
          - 永靖鄉
          - 埔心鄉
          - 溪湖鎮
          - 大村鄉
          - 埔鹽鄉
          - 田中鎮
          - 北斗鎮
          - 田尾鄉
          - 埤頭鄉
          - 溪州鄉
          - 竹塘鄉
          - 二林鎮
          - 大城鄉
          - 芳苑鄉
          - 二水鄉
    steps:
      - uses: actions/checkout@v4

      - name: Fetch building license range
        run: >-
          python3 scripts/fetch-buildlic-open-data.py
          --district ${{ matrix.district }}
          --fetch-only

      - uses: actions/upload-artifact@v4
        with:
          name: buildlic-${{ strategy.job-index }}
          path: downloads/buildlic/*.json
          retention-days: 1

  build:
    needs: fetch
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: buildlic-*
          path: downloads/buildlic
          merge-multiple: true

      - name: Build district shards
        run: >-
          python3 scripts/fetch-buildlic-open-data.py
          --build-only
          --require-address 彰化縣埤頭鄉稻香路468號

      - name: Upload built data
        uses: actions/upload-artifact@v4
        with:
          name: buildlic-site
          path: data/buildlic
          retention-days: 1

  deploy:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: source

      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: publish

      - uses: actions/download-artifact@v4
        with:
          name: buildlic-site
          path: publish/data/buildlic

      - name: Copy frontend
        run: |
          cp source/terminal.html source/terminal.js source/cpamiOpenData.js publish/

      - name: Publish
        working-directory: publish
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add terminal.html terminal.js cpamiOpenData.js data/buildlic
          git commit -m "Update building license data" || exit 0
          git push origin gh-pages
