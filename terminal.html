<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>some random data terminal</title>
    <link rel="stylesheet" href="vendor/monaco/vs/editor/editor.main.css?v=20260601-monaco-json" />
    <link rel="stylesheet" href="terminal.css?v=20260602-license-bottom" />
  </head>
  <body>
    <header class="terminal-top">
      <a href="index.html">some random data</a>
      <a href="auction-terminal.html">Auction Terminal</a>
      <a href="combined-terminal.html">Combined Terminal</a>
      <a href="buildlic-terminal.html">Build License</a>
      <strong>Property Terminal</strong>
      <span id="perfBadge">SQLite</span>
      <button class="theme-button" id="themeToggle" type="button" title="切換明暗模式">☾</button>
    </header>

    <main class="terminal-shell">
      <aside class="filter-rail">
        <div class="filter-row">
          <label>縣市<select id="citySelect"></select></label>
          <label>鄉鎮<select id="districtSelect"></select></label>
        </div>
        <label>全欄位搜尋<input id="keywordInput" name="terminal-keyword" type="search" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" data-lpignore="true" data-1p-ignore="true" placeholder="社區、地址、棟及號、115S1" /></label>
        <div class="preset-bar">
          <button id="largeDetachedPreset" type="button">非暴躁鼠鼠</button>
          <span id="savedPresets"></span>
          <button id="addPreset" class="preset-add" type="button" title="新增目前篩選">+</button>
        </div>

        <div class="active-filters" id="activeFilters"></div>
        <p class="license-notice">
          資料來源：內政部不動產交易實價登錄 Open Data。授權：
          <a href="https://data.gov.tw/licenses" target="_blank" rel="noreferrer">政府資料開放授權條款-第1版</a>。
        </p>
      </aside>

      <section class="grid-stage">
        <div class="grid-toolbar">
          <span id="resultMeta">--</span>
          <div class="toolbar-actions">
            <button id="columnButton" type="button">欄位</button>
            <button id="exportCsv" type="button">CSV</button>
          </div>
        </div>
        <div class="column-popover" id="columnPopover"></div>
        <div class="data-grid" id="gridWrap">
          <table>
            <thead id="gridHead"></thead>
            <tbody id="gridRows"></tbody>
          </table>
        </div>
      </section>

      <aside class="analytics-panel">
        <h2 id="analyticsTitle">Column</h2>
        <div id="analyticsBody">點欄位看分布。</div>
      </aside>
    </main>
    <div class="context-menu" id="contextMenu"></div>
    <aside class="json-drawer" id="jsonDrawer" aria-hidden="true">
      <section class="json-panel" role="dialog" aria-label="Raw JSON">
        <header class="json-head">
          <div>
            <span>Raw JSON</span>
            <strong id="jsonTitle">JSON</strong>
            <small id="jsonMeta"></small>
          </div>
          <div class="json-actions" id="jsonActions"></div>
          <button id="closeJson" type="button">×</button>
        </header>
        <div class="json-editor" id="jsonEditor"></div>
        <pre class="json-fallback" id="jsonCode"></pre>
      </section>
    </aside>
    <div class="load-status-bar" id="loadStatusBar" aria-live="polite" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <span id="loadStatusText">Ready</span>
      <span class="load-status-track"><span class="load-status-fill" id="loadStatusFill"></span></span>
    </div>

    <script src="queryService.js?v=20260602-activity-timeout" defer></script>
    <script src="cpamiOpenData.js?v=20260606-address-match" defer></script>
    <script src="terminal.js?v=20260606-local-property-data" defer></script>
  </body>
</html>
