<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>some random data terminal</title>
    <link rel="stylesheet" href="terminal.css?v=20260531-terminal-controls" />
  </head>
  <body>
    <header class="terminal-top">
      <a href="index.html">some random data</a>
      <strong>Property Terminal</strong>
      <span id="perfBadge">SQLite</span>
    </header>

    <main class="terminal-shell">
      <aside class="filter-rail">
        <div class="filter-row">
          <label>縣市<select id="citySelect"></select></label>
          <label>鄉鎮<select id="districtSelect"></select></label>
        </div>
        <div class="town-tags" id="townTags"></div>
        <label>全欄位搜尋<input id="keywordInput" type="search" placeholder="社區、地址、棟及號、115S1" /></label>

        <section class="filter-section">
          <div class="section-head">
            <strong>Range</strong>
          </div>
          <div class="range-grid">
            <div class="range-control" data-range="building_area_ping">
              <div><span>建坪</span><output id="buildingRangeLabel">--</output></div>
              <div class="single-range"><input id="buildingMin" type="range" /></div>
            </div>
            <div class="range-control" data-range="land_area_ping">
              <div><span>地坪</span><output id="landRangeLabel">--</output></div>
              <div class="single-range"><input id="landMin" type="range" /></div>
            </div>
            <div class="range-control" data-range="total_price">
              <div><span>總價(萬)</span><output id="priceRangeLabel">--</output></div>
              <div class="single-range"><input id="priceMin" type="range" /></div>
            </div>
            <div class="range-control" data-range="unit_price_ping">
              <div><span>單價/坪(萬)</span><output id="unitRangeLabel">--</output></div>
              <div class="single-range"><input id="unitMin" type="range" /></div>
            </div>
          </div>
        </section>

        <section class="filter-section">
          <strong>Boolean</strong>
          <div class="segmented" data-toggle-group="parking">
            <button type="button" class="active" data-parking="">不限</button>
            <button type="button" data-parking="true">有車位</button>
            <button type="button" data-parking="false">無車位</button>
          </div>
        </section>

        <section class="filter-section">
          <strong>String</strong>
          <div class="string-filter">
            <select id="stringField">
              <option value="property_type">型態</option>
              <option value="community_name">社區</option>
              <option value="full_address">地址</option>
              <option value="building_no">棟及號</option>
              <option value="road">路名</option>
            </select>
            <select id="stringOperator">
              <option value="contains">contains</option>
              <option value="notContains">not contains</option>
              <option value="anyContains">any contains</option>
              <option value="exact">exact</option>
            </select>
            <input id="stringValue" placeholder="透天, 別墅" />
            <button id="addStringFilter" type="button">加入</button>
          </div>
          <button id="detachedParkingScreen" class="wide-button" type="button">建坪 > 50 · 透天/別墅 · 有車位</button>
        </section>

        <div class="filter-builder">
          <select id="fieldSelect"></select>
          <select id="operatorSelect"></select>
          <input id="filterValue" placeholder="值" />
          <input id="filterValue2" placeholder="第二值" />
          <button id="addFilter" type="button">加入</button>
        </div>

        <div class="active-filters" id="activeFilters"></div>

        <div class="saved">
          <input id="presetName" placeholder="命名目前條件" />
          <button id="savePreset" type="button">儲存</button>
          <div id="savedPresets"></div>
        </div>
      </aside>

      <section class="grid-stage">
        <div class="grid-toolbar">
          <span id="resultMeta">--</span>
          <div class="toolbar-actions">
            <button id="columnButton" type="button">欄位</button>
            <button id="exportCsv" type="button">CSV</button>
          </div>
        </div>
        <div class="column-popover" id="columnPopover"></div>
        <div class="data-grid" id="gridWrap">
          <table>
            <thead id="gridHead"></thead>
            <tbody id="gridRows"></tbody>
          </table>
        </div>
      </section>

      <aside class="analytics-panel">
        <h2 id="analyticsTitle">Column</h2>
        <div id="analyticsBody">點欄位看分布。</div>
      </aside>
    </main>
    <div class="context-menu" id="contextMenu"></div>

    <script src="queryService.js?v=20260531-sqlite-hardening" defer></script>
    <script src="terminal.js?v=20260531-terminal-controls" defer></script>
  </body>
</html>
